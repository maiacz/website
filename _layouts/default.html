<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand"><a href="/">{{ site.title }}</a></div>
      <nav class="primary">
        <a href="/">Home</a>
        <a href="/projects/">Projects</a>
        <a href="/resume/">Resume</a>
        <a href="/contact/">Contact</a>
      </nav>
      <div class="header-controls">
        <button id="theme-toggle" aria-label="Enable dark mode!" title="Enable dark mode!">
          <span class="theme-icon" aria-hidden="true">☀️</span>
          <span class="theme-knob" aria-hidden="true"></span>
        </button>
        <div class="theme-meta">
          <div class="theme-title">Vibe</div>
          <div id="theme-sub" class="theme-sub">enable dark mode!</div>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>
  <footer>
    <div class="container">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }} — <a href="https://github.com/maiacz" target="_blank">GitHub</a></p>
    </div>
  </footer>
  <script src="/assets/js/theme.js" defer></script>
  <script src="/assets/js/projects-filter.js" defer></script>
  <script src="/assets/js/hero.js" defer></script>
</body>
</html>
