name: Convert Office files to PDF and generate thumbnails

on:
  push:
    paths:
      - 'assets/files/**/*.docx'
      - 'assets/files/**/*.pptx'
      - '**/*.docx'
      - '**/*.pptx'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install LibreOffice and ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice imagemagick ghostscript

      - name: Convert Office files to PDF and generate thumbnails
        run: |
          mkdir -p assets/files assets/images
          set -e
          # Convert DOCX and PPTX files in assets/files
          for f in assets/files/*.docx assets/files/*.pptx; do
            [ -f "$f" ] || continue
            echo "Converting $f"
            libreoffice --headless --convert-to pdf "$f" --outdir assets/files || true
            BASENAME=$(basename "$f" | sed 's/\.[^.]*$//')
            PDF="assets/files/${BASENAME}.pdf"
            if [ -f "$PDF" ]; then
              # generate thumbnail (first page)
              convert -density 150 "${PDF}[0]" -quality 85 -resize 1200x "assets/images/${BASENAME}.png" || true
            fi
          done

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/files/*.pdf assets/images/*.png || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-convert Office files to PDF and generate thumbnails [ci skip]" || true
            git push || true
          fi
