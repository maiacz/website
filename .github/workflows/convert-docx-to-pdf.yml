name: Convert DOCX to PDF

on:
  push:
    paths:
      - '**/*resume*.docx'
      - '**/*.docx'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install LibreOffice and ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice imagemagick ghostscript

      - name: Locate DOCX
        id: find
        run: |
          DOCXFILE=$(ls *[Rr]esume*.docx 2>/dev/null | head -n1 || true)
          if [ -z "$DOCXFILE" ]; then DOCXFILE=$(ls *.docx 2>/dev/null | head -n1 || true); fi
          if [ -z "$DOCXFILE" ]; then echo "No DOCX found to convert"; exit 0; fi
          echo "found=$DOCXFILE" >> $GITHUB_OUTPUT

      - name: Convert to PDF and generate thumbnail
        if: steps.find.outputs.found != ''
        run: |
          mkdir -p assets assets/images
          libreoffice --headless --convert-to pdf "${{ steps.find.outputs.found }}" --outdir assets
          BASENAME=$(basename "${{ steps.find.outputs.found }}" .docx)
          if [ -f "assets/${BASENAME}.pdf" ]; then
            # generate PNG thumbnail from first page
            if command -v convert >/dev/null 2>&1; then
              convert -density 150 "assets/${BASENAME}.pdf[0]" -quality 85 -resize 1200x "assets/images/${BASENAME}.png" || true
            fi
            # if this looks like a resume, also copy to canonical name
            case "$BASENAME" in
              *resume*|*Resume*) cp "assets/${BASENAME}.pdf" assets/resume.pdf ;;
            esac
          fi

      - name: Commit and push PDF
        if: steps.find.outputs.found != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/resume.pdf || true
          if git diff --staged --quiet; then echo "No changes to commit"; else git commit -m "Auto-convert resume DOCX to PDF [ci skip]" && git push; fi
